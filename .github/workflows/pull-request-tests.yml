name: Pull Request Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OntologiaVacuidad.sln

      - name: Build
        run: dotnet build OntologiaVacuidad.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OntologiaVacuidad.sln --configuration Release --no-build --verbosity normal
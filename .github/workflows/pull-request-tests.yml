name: Pull Request Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OntologiaVacuidad.sln

      - name: Build
        run: dotnet build OntologiaVacuidad.sln --configuration Release --no-restore

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Test With Coverage
        shell: pwsh
        run: |
          $projects = @(
            @{ Name = 'Models'; TestProject = 'Models.Tests/Models.Tests.csproj'; ResultsDirectory = 'TestResults/Models'; PackageName = 'Models' },
            @{ Name = 'DomainLogic'; TestProject = 'DomainLogic.Tests/DomainLogic.Tests.csproj'; ResultsDirectory = 'TestResults/DomainLogic'; PackageName = 'DomainLogic' }
          )

          foreach ($project in $projects) {
            dotnet test $project.TestProject --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory $project.ResultsDirectory --verbosity normal
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $coverageFile = Get-ChildItem $project.ResultsDirectory -Recurse -Filter 'coverage.cobertura.xml' | Select-Object -First 1
            if (-not $coverageFile) {
              throw "Coverage file not found for $($project.Name)."
            }

            [xml]$coverage = Get-Content $coverageFile.FullName
            $package = @($coverage.coverage.packages.package | Where-Object { $_.name -eq $project.PackageName } | Select-Object -First 1)
            if (-not $package) {
              throw "Coverage package '$($project.PackageName)' not found for $($project.Name)."
            }

            $lineRate = [double]$package.'line-rate'
            $coveragePercent = [math]::Round($lineRate * 100, 2)

            Write-Host "$($project.Name) coverage: $coveragePercent%"

            if ($lineRate -lt 1) {
              throw "$($project.Name) coverage is $coveragePercent%. Expected 100%."
            }
          }

      - name: Generate Coverage Report
        shell: pwsh
        run: |
          reportgenerator "-reports:TestResults/**/coverage.cobertura.xml" "-targetdir:CoverageReport" "-reporttypes:HtmlInline;MarkdownSummaryGithub"

      - name: Publish Coverage Summary
        shell: pwsh
        run: |
          Get-Content CoverageReport/SummaryGithub.md | Out-File $env:GITHUB_STEP_SUMMARY -Append

      - name: Comment Coverage On PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'CoverageReport/SummaryGithub.md';
            const summary = fs.readFileSync(summaryPath, 'utf8');
            const body = ['## Coverage Report', summary].join('\n\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const marker = '<!-- coverage-report -->';
            const fullBody = `${marker}\n${body}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: fullBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: fullBody
              });
            }

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport
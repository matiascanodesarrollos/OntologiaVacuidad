name: Pull Request Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OntologiaVacuidad.sln

      - name: Build
        run: dotnet build OntologiaVacuidad.sln --configuration Release --no-restore

      - name: Test With Coverage
        shell: pwsh
        run: |
          $projects = @(
            @{ Name = 'Models'; TestProject = 'Models.Tests/Models.Tests.csproj'; ResultsDirectory = 'TestResults/Models'; PackageName = 'Models' },
            @{ Name = 'DomainLogic'; TestProject = 'DomainLogic.Tests/DomainLogic.Tests.csproj'; ResultsDirectory = 'TestResults/DomainLogic'; PackageName = 'DomainLogic' }
          )

          $summaryLines = @(
            '## Coverage Report',
            '',
            '| Project | Coverage |',
            '| --- | ---: |'
          )

          foreach ($project in $projects) {
            dotnet test $project.TestProject --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory $project.ResultsDirectory --verbosity normal
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $coverageFile = Get-ChildItem $project.ResultsDirectory -Recurse -Filter 'coverage.cobertura.xml' | Select-Object -First 1
            if (-not $coverageFile) {
              throw "Coverage file not found for $($project.Name)."
            }

            [xml]$coverage = Get-Content $coverageFile.FullName
            $package = @($coverage.coverage.packages.package | Where-Object { $_.name -eq $project.PackageName } | Select-Object -First 1)
            if (-not $package) {
              throw "Coverage package '$($project.PackageName)' not found for $($project.Name)."
            }

            $coveragePercent = [math]::Round(([double]$package.'line-rate') * 100, 2)
            Write-Host "$($project.Name) coverage: $coveragePercent%"
            $summaryLines += "| $($project.Name) | $coveragePercent% |"
          }

          $summaryLines | Set-Content CoverageSummary.md

      - name: Publish Coverage Summary
        shell: pwsh
        run: |
          Get-Content CoverageSummary.md | Out-File $env:GITHUB_STEP_SUMMARY -Append

      - name: Comment Coverage On PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('CoverageSummary.md', 'utf8');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload Coverage Results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: |
            CoverageSummary.md
            TestResults